<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="mood8">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- Google Sign-In (GSI). The `google-signin-client_id` meta is the
       Web OAuth client id and is what `google_sign_in_web` reads at
       boot to wire its GSI client. Without it the web plugin can't
       initialize the Google Identity Services library and the flow
       surfaces a misleading "couldn't reach Google" error. Loading
       the GSI client script up-front avoids a first-tap latency
       blip and also makes the failure mode (script blocked → no
       GSI namespace) cleaner to debug.
       Web Client ID is a public identifier — only the SECRET is
       sensitive, and that lives only on the backend. -->
  <meta name="google-signin-client_id"
        content="322539199748-bonlhpebtrlsl01m3gs7s4n2d19en16v.apps.googleusercontent.com">
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <title>mood8</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
