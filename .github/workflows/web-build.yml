name: Build Web

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Flutter Web
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.9'
          cache: true

      - name: Display versions
        run: |
          flutter --version
          dart --version

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze
        continue-on-error: true

      - name: Build web (release)
        # `--base-href "/app/"` is REQUIRED: nginx serves the Flutter
        # SPA at https://mood8.app/app/ (the bare domain is the
        # marketing landing page since 757d5dc). Without it the
        # built index.html ships `<base href="/">`, asset fetches
        # resolve to https://mood8.app/assets/... → 404 → white
        # page on cold load.
        run: flutter build web --release --base-href "/app/"

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mood8-web
          path: build/web
          retention-days: 30

      - name: Web summary
        run: |
          SIZE=$(du -sh build/web | cut -f1)
          {
            echo "## Mood8 Web build"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Output | \`build/web\` |"
            echo "| Size | $SIZE |"
            echo "| Run | ${{ github.run_number }} |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo ""
            echo "Download under **Artifacts** → \`mood8-web\`."
          } >> "$GITHUB_STEP_SUMMARY"
