name: Build Android APK + AAB

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build phone APK + App Bundle
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Display versions
        run: |
          flutter --version
          java -version
          dart --version

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze
        continue-on-error: true

      # Accept ALL Android SDK licenses up front. flutter doctor only
      # accepts licenses for packages already on disk; the build trips on
      # ndk;28.2.x which the GH runner doesn't ship, so we also accept via
      # sdkmanager which covers not-yet-installed packages.
      - name: Accept Android SDK licenses
        run: |
          yes | flutter doctor --android-licenses || true
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true

      # Pre-install the exact NDK Flutter pins. Gradle CAN auto-install
      # it but only AFTER licenses are accepted for that specific package
      # — and the runner image misses the SHA for new NDK lines until
      # we run sdkmanager --licenses (above). Doing it explicitly here
      # surfaces install errors as a clean step failure instead of a
      # cryptic Gradle stack trace.
      - name: Install required Android NDK
        run: |
          NDK_VERSION="28.2.13676358"
          echo "Installing ndk;${NDK_VERSION}"
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;${NDK_VERSION}"
          ls -la "$ANDROID_HOME/ndk/" || true

      - name: Build APK (release, debug-signed)
        run: |
          set -o pipefail
          flutter build apk --release --verbose \
            --build-name=0.1.${{ github.run_number }} \
            --build-number=${{ github.run_number }} 2>&1 | tee /tmp/apk-build.log

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: /tmp/apk-build.log
          retention-days: 14

      - name: Build App Bundle (release, debug-signed)
        run: |
          flutter build appbundle --release \
            --build-name=0.1.${{ github.run_number }} \
            --build-number=${{ github.run_number }}

      - name: Rename artifacts
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-release.apk \
             artifacts/mood8-android-${{ github.run_number }}.apk
          cp build/app/outputs/bundle/release/app-release.aab \
             artifacts/mood8-android-${{ github.run_number }}.aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mood8-android-apk-${{ github.run_number }}
          path: artifacts/mood8-android-${{ github.run_number }}.apk
          retention-days: 30

      - name: Upload App Bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: mood8-android-aab-${{ github.run_number }}
          path: artifacts/mood8-android-${{ github.run_number }}.aab
          retention-days: 30

      - name: Build summary
        run: |
          APK_PATH="artifacts/mood8-android-${{ github.run_number }}.apk"
          AAB_PATH="artifacts/mood8-android-${{ github.run_number }}.aab"
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          AAB_SIZE=$(du -h "$AAB_PATH" | cut -f1)
          {
            echo "## Mood8 Android build"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| APK | \`mood8-android-${{ github.run_number }}.apk\` ($APK_SIZE) |"
            echo "| AAB | \`mood8-android-${{ github.run_number }}.aab\` ($AAB_SIZE) |"
            echo "| Application id | \`com.mood8.app\` |"
            echo "| Build number | ${{ github.run_number }} |"
            echo "| Version | 0.1.${{ github.run_number }} |"
            echo "| Signing | debug keys (unsigned for release) |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo ""
            echo "Download under **Artifacts** above."
            echo ""
            echo "Sideload with:"
            echo "\`\`\`"
            echo "adb install -r mood8-android-${{ github.run_number }}.apk"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
