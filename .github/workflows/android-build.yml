name: Build Android APK + AAB

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build phone APK + App Bundle
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Display versions
        run: |
          flutter --version
          java -version
          dart --version

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze
        continue-on-error: true

      # Accept all installed Android SDK licenses BEFORE the build attempts
      # to auto-install the NDK that flutter.ndkVersion requires. Without
      # this, Gradle dies with `LicenceNotAcceptedException: ndk;28.2.x`
      # because the GH runner image ships some Android SDK packages but
      # not the exact NDK Flutter pins.
      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Build APK (release, debug-signed)
        run: |
          flutter build apk --release \
            --build-name=0.1.${{ github.run_number }} \
            --build-number=${{ github.run_number }}

      - name: Build App Bundle (release, debug-signed)
        run: |
          flutter build appbundle --release \
            --build-name=0.1.${{ github.run_number }} \
            --build-number=${{ github.run_number }}

      - name: Rename artifacts
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-release.apk \
             artifacts/mood8-android-${{ github.run_number }}.apk
          cp build/app/outputs/bundle/release/app-release.aab \
             artifacts/mood8-android-${{ github.run_number }}.aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mood8-android-apk-${{ github.run_number }}
          path: artifacts/mood8-android-${{ github.run_number }}.apk
          retention-days: 30

      - name: Upload App Bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: mood8-android-aab-${{ github.run_number }}
          path: artifacts/mood8-android-${{ github.run_number }}.aab
          retention-days: 30

      - name: Build summary
        run: |
          APK_PATH="artifacts/mood8-android-${{ github.run_number }}.apk"
          AAB_PATH="artifacts/mood8-android-${{ github.run_number }}.aab"
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          AAB_SIZE=$(du -h "$AAB_PATH" | cut -f1)
          {
            echo "## Mood8 Android build"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| APK | \`mood8-android-${{ github.run_number }}.apk\` ($APK_SIZE) |"
            echo "| AAB | \`mood8-android-${{ github.run_number }}.aab\` ($AAB_SIZE) |"
            echo "| Application id | \`com.mood8.app\` |"
            echo "| Build number | ${{ github.run_number }} |"
            echo "| Version | 0.1.${{ github.run_number }} |"
            echo "| Signing | debug keys (unsigned for release) |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo ""
            echo "Download under **Artifacts** above."
            echo ""
            echo "Sideload with:"
            echo "\`\`\`"
            echo "adb install -r mood8-android-${{ github.run_number }}.apk"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
