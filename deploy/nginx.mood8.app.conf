server {
    server_name mood8.app www.mood8.app;

    # The landing page is the new root. The Flutter web app moved to
    # /app/ so the marketing site can own the bare domain.
    root /home/admin/projects/mood8/landing;
    index index.html;

    access_log /var/log/nginx/mood8.access.log;
    error_log /var/log/nginx/mood8.error.log;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    # AI Backend Proxy — `^~` makes this beat the static-file regex
    # below so /api/avatars/<file> reaches FastAPI instead of the SPA
    # root.
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Public APK + download landing.
    location ^~ /download/ {
        alias /home/admin/projects/mood8/downloads/;
        autoindex off;
        index index.html;

        # MIME hint so Android treats it as an installable APK rather
        # than a generic blob.
        types {
            application/vnd.android.package-archive apk;
            text/html html;
            text/css css;
            application/javascript js;
        }
        default_type application/octet-stream;

        add_header Cache-Control "public, max-age=300, must-revalidate";
    }

    # Flutter web app — moved off the bare domain to /app/.
    # `^~` so the static-file regex doesn't intercept .js / .css here
    # (which would skip the SPA fallback for hash-routed deep links).
    location ^~ /app/ {
        alias /home/admin/projects/mood8/build/web/;
        index index.html;

        # SPA fallback — any unknown path inside /app/ falls back to
        # the Flutter shell so client-side routing works on refresh.
        try_files $uri $uri/ /app/index.html;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Service worker — never cache, otherwise users get stuck on
        # an old build.
        location = /app/flutter_service_worker.js {
            alias /home/admin/projects/mood8/build/web/flutter_service_worker.js;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # The SPA shell — never cache either, so a deploy is immediate.
        location = /app/index.html {
            alias /home/admin/projects/mood8/build/web/index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # Cache static assets (landing CSS/JS + Flutter assets that fall
    # through here from inside /app/).
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Bare domain → landing page. No SPA fallback here — the landing
    # is plain static HTML.
    location / {
        try_files $uri $uri/ =404;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # SSL (managed by Certbot)
    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/mood8.app/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/mood8.app/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# HTTP to HTTPS redirect (managed by Certbot)
server {
    if ($host = www.mood8.app) {
        return 301 https://$host$request_uri;
    }
    if ($host = mood8.app) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name mood8.app www.mood8.app;
    return 404;
}
